version: '3.8'

services:
  app1:
    build: .
    environment:
      - DB_HOST=mysql
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_NAME=brizzzo_db
      - REDIS_HOST=redis
      - JWT_SECRET=your_jwt_secret_here
      - SERVER_ID=app1
    depends_on:
      - mysql
      - redis
    volumes:
      - .:/app
      - /app/node_modules

  app2:
    build: .
    environment:
      - DB_HOST=mysql
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_NAME=brizzzo_db
      - REDIS_HOST=redis
      - JWT_SECRET=your_jwt_secret_here
      - SERVER_ID=app2
    depends_on:
      - mysql
      - redis
    volumes:
      - .:/app
      - /app/node_modules

  nginx:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app1
      - app2

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: brizzzo_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  mysql_data: