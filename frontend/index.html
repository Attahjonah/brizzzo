<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brizzzo - Real-time Messaging</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Auth Section -->
        <div id="auth-section" class="auth-section">
            <div class="auth-container">
                <h1>Brizzzo</h1>
                <div class="auth-tabs">
                    <button id="login-tab" class="auth-tab active">Login</button>
                    <button id="register-tab" class="auth-tab">Register</button>
                </div>

                <!-- Login Form -->
                <form id="login-form" class="auth-form active">
                    <div class="form-group">
                        <input type="email" id="login-email" placeholder="Email" required>
                    </div>
                    <div class="form-group">
                        <input type="password" id="login-password" placeholder="Password" required>
                    </div>
                    <button type="submit" class="auth-btn">Login</button>
                </form>

                <!-- Register Form -->
                <form id="register-form" class="auth-form">
                    <div class="form-group">
                        <input type="text" id="register-username" placeholder="Username" required>
                    </div>
                    <div class="form-group">
                        <input type="email" id="register-email" placeholder="Email" required>
                    </div>
                    <div class="form-group">
                        <input type="password" id="register-password" placeholder="Password" required>
                    </div>
                    <button type="submit" class="auth-btn">Register</button>
                </form>

                <div id="auth-message" class="auth-message"></div>
            </div>
        </div>

        <!-- Chat Section -->
        <div id="chat-section" class="chat-section hidden">
            <div class="chat-container">
                <!-- Header -->
                <div class="chat-header">
                    <div class="user-info">
                        <span id="current-user">User</span>
                        <span id="connection-status" class="status offline">● Offline</span>
                    </div>
                    <button id="logout-btn" class="logout-btn">Logout</button>
                </div>

                <div class="main-chat-area">
                <div class="users-panel">
                    <h3>Direct Messages <button id="refresh-users-btn" class="refresh-btn" title="Refresh users">🔄</button></h3>
                    <div class="user-search-bar">
                        <input type="text" id="user-search-input" placeholder="Search users..." autocomplete="off">
                    </div>
                    <div id="users-list" class="users-list">
                        <!-- Users will be populated here -->
                    </div>
                </div>

                    <!-- Chat Area -->
                    <div class="chat-area" id="chat-area">
                        <!-- Chat Header (shown when user selected) -->
                        <div class="chat-with-header" id="chat-with-header" style="display: none;">
                            <div class="chat-with-info">
                                <div class="chat-with-avatar">
                                    <span id="chat-with-avatar">👤</span>
                                </div>
                                <div class="chat-with-details">
                                    <h4 id="chat-with-name">Select a user to start chatting</h4>
                                    <p id="chat-with-email"></p>
                                </div>
                            </div>
                            <button id="back-to-users-btn" class="back-btn" style="display: none;">← Back</button>
                        </div>

                        <!-- Messages Area -->
                        <div class="chat-messages" id="chat-messages">
                            <div class="no-chat-selected">
                                <p>👋 Select a user from the list to start a conversation</p>
                            </div>
                        </div>

                        <!-- Message Input -->
                        <div class="message-input" id="message-input-area" style="display: none;">
                            <input type="text" id="message-input" placeholder="Type a message..." maxlength="500">
                            <button id="send-btn" class="send-btn">Send</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
