version: '3.8'

services:
  app1:
    build: ./backend
    environment:
      - DB_HOST=mysql
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_NAME=brizzzo_db
      - REDIS_HOST=redis
      - JWT_SECRET=your_jwt_secret_here
      - SERVER_ID=app1
    depends_on:
      - mysql
      - redis

  app2:
    build: ./backend
    environment:
      - DB_HOST=mysql
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_NAME=brizzzo_db
      - REDIS_HOST=redis
      - JWT_SECRET=your_jwt_secret_here
      - SERVER_ID=app2
    depends_on:
      - mysql
      - redis

  nginx:
    build: ./nginx
    ports:
      - "80:80"
    depends_on:
      - app1
      - app2

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: brizzzo_db
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine

volumes:
  mysql_data: